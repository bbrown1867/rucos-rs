name: Build & Test

on:
  push:
    branches:
      master
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: RuCOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: cargo fmt --check
      - run: cargo build
      - run: cargo build --release
      - run: cargo build --example task_basic
      - run: cargo build --example task_advanced
